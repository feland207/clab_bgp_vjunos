---
- name: "STAGE 2a: Implement Routing Policies (RPL)"
  hosts: all
  connection: ansible.netcommon.network_cli
  gather_facts: no

  vars_files:
    - ../secrets.yml

  tasks:
    - name: Load per-node static variables
      ansible.builtin.include_vars:
        file: "../node_vars/{{ inventory_hostname }}.yml"

    - name: PREPARE AND PREVIEW - Render Policies configuration and save locally
      delegate_to: localhost
      # Execute only if policies or prefix_sets are defined for this specific node
      when: policies is defined or prefix_sets is defined
      block:
        - name: Save rendered RPL template to /tmp directory
          ansible.builtin.template:
            src: "../templates/bgp/rpl_t0.j2"
            dest: "/tmp/{{ inventory_hostname }}_policies.cfg"

        - name: Preview the rendered Policies configuration
          ansible.builtin.debug:
            msg: 
              - "#--- RPL Policies ({{ inventory_hostname }}) ---#"
              - "{{ lookup('file', '/tmp/{{ inventory_hostname }}_policies.cfg').splitlines() }}"

    - name: Configure Routing Policies (RPL)
      cisco.iosxr.iosxr_config:
        src: "/tmp/{{ inventory_hostname }}_policies.cfg"
        comment: "Ansible: Configured prefix-sets and route-policies"
      register: policy_result
      when: policies is defined or prefix_sets is defined

    - name: Display Configuration Changes
      ansible.builtin.debug:
        var: policy_result.commands
      # Only show the debug if commands were actually pushed
      when: policy_result is defined and policy_result.changed
