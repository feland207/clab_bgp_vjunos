---
loopback_ipv4: "3.3.3.3/32"
isis_system_id: "0000.0000.3333"

interfaces:
  - name: "GigabitEthernet0/0/0/0"
    ipv4_address: "100.100.35.1/30"
    description: "Link to R5"
  - name: "GigabitEthernet0/0/0/1"
    ipv4_address: "100.100.23.2/30"
    description: "Link to R2"
    ospf_area: "0.0.0.0"
  - name: "GigabitEthernet0/0/0/2"
    ipv4_address: "100.100.13.2/30"
    description: "Link to R1"
    ospf_area: "0.0.0.0"

# Define the Prefix Sets for RPL
prefix_sets:
  - name: "PS-LOCAL-PREFIXES"
    prefixes:
      - "10.1.1.0/24"
      - "10.99.99.0/24"

# Define the Routing Policies
policies:
  - name: "EXPORT-OSPF-TO-EBGP"
    statements:
      - condition: "destination in PS-LOCAL-PREFIXES"
        action: "pass"
  - name: "PASS-ALL"
    statements:
      - action: "pass"

# BGP Overlay Configuration
bgp:
  local_as: 100
  groups:
    - name: "IBGP-AS100"
      type: "internal"
      next_hop_self: true
      peers:
      - ip: "1.1.1.1"
        description: "iBGP to R1"
      - ip: "2.2.2.2"
        description: "iBGP to R2"

    - name: "EBGP-AS300"
      type: "external"
      peer_as: 300
      export_policy: "EXPORT-OSPF-TO-EBGP"
      import_policy: "PASS-ALL"
      peers:
      - ip: "100.100.35.2"
        description: "eBGP to R5"
