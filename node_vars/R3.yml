---
loopback_ipv4: "3.3.3.3/32"
isis_system_id: "0000.0000.3333"

interfaces:
  - name: "ge-0/0/0"
    ipv4_address: "100.100.35.1/30"
    description: "Link to R5"
  - name: "ge-0/0/1"
    ipv4_address: "100.100.23.2/30"
    description: "Link to R2"
    ospf_area: "0.0.0.0"
  - name: "ge-0/0/2"
    ipv4_address: "100.100.13.2/30"
    description: "Link to R1"
    ospf_area: "0.0.0.0"

# Define the routing policies
policies:
  - name: "EXPORT-OSPF-TO-EBGP"
    terms:
      - name: "1"
        from_protocol: "ospf"
        route_filters:
          - "10.1.1.0/24 exact"
          - "10.99.99.0/24 exact"
        then: "accept"

  - name: "NEXT-HOP-SELF"
    terms:
      - name: "1"
        then: "next-hop self"

# BGP Overlay Configuration
bgp:
  local_as: 100
  groups:
    - name: "IBGP-OVERLAY"
      type: "internal"
      export_policy: "NEXT-HOP-SELF"
      peers:
      - ip: "1.1.1.1"
        description: "iBGP to R1"
      - ip: "2.2.2.2"
        description: "iBGP to R2"

    - name: "EBGP-AS300"
      type: "external"
      peer_as: 300
      export_policy: "EXPORT-OSPF-TO-EBGP"
      peers:
      - ip: "100.100.35.2"
        description: "eBGP to R5"
