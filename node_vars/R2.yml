---
loopback_ipv4: "2.2.2.2/32"
isis_system_id: "0000.0000.2222"

interfaces:
  - name: "ge-0/0/0"
    ipv4_address: "100.100.24.1/30"
    description: "Link to R4"
  - name: "ge-0/0/1"
    ipv4_address: "100.100.23.1/30"
    description: "Link to R3"
    ospf_area: "0.0.0.0"
  - name: "ge-0/0/2"
    ipv4_address: "100.100.12.2/30"
    description: "Link to R1"
    ospf_area: "0.0.0.0"

# Define the routing policies
policies:
  - name: "EXPORT-OSPF-TO-EBGP"
    terms:
      - name: "1"
        from_protocol: "ospf"
        route_filters:
          - "10.1.1.0/24 exact"
          - "10.99.99.0/24 exact"
        then: "accept"

  - name: "SET-LOCAL-PREF"
    terms:
      - name: "1"
        from_protocol: "bgp"
        local_preference: 101
        then: "accept"

  - name: "NEXT-HOP-SELF"
    terms:
      - name: "1"
        then: "next-hop self"

# BGP Overlay Configuration
bgp:
  local_as: 100
  groups:
    - name: "IBGP-OVERLAY"
      type: "internal"
      # export_policy: "NEXT-HOP-SELF"
      peers:
      - ip: "1.1.1.1"
        description: "iBGP to R1"
      - ip: "3.3.3.3"
        description: "iBGP to R3"

    - name: "EBGP-AS200"
      type: "external"
      peer_as: 200
      import_policy: "SET-LOCAL-PREF"
      export_policy: "EXPORT-OSPF-TO-EBGP"
      peers:
      - ip: "100.100.24.2"
        description: "eBGP to R4"
