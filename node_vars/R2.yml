---
loopback_ipv4: "2.2.2.2/32"
isis_system_id: "0000.0000.2222"

interfaces:
  - name: "GigabitEthernet0/0/0/0"
    ipv4_address: "100.100.24.1/30"
    description: "Link to R4"
  - name: "GigabitEthernet0/0/0/1"
    ipv4_address: "100.100.23.1/30"
    description: "Link to R3"
    ospf_area: "0.0.0.0"
  - name: "GigabitEthernet0/0/0/2"
    ipv4_address: "100.100.12.2/30"
    description: "Link to R1"
    ospf_area: "0.0.0.0"

static_routes:
  - prefix: "10.6.6.0/24"
    action: "discard"
    state: "absent"

# Define the Prefix Sets for RPL
prefix_sets:
  - name: "PS-LOCAL-PREFIXES"
    prefixes:
      - "10.1.1.0/24"
      - "10.99.99.0/24"

# Define the Routing Policies (RPL format)
policies:
  - name: "EXPORT-OSPF-TO-EBGP"
    statements:
      - condition: "destination in PS-LOCAL-PREFIXES"
        action: "pass"
  - name: "SET-LOCAL-PREF"
    statements:
      - action: "set local-preference 99"
      - action: "pass"
  - name: "PASS-ALL"
    statements:
      - action: "pass"

# BGP Overlay Configuration
bgp:
  local_as: 100
  groups:
    - name: "IBGP-AS100"
      type: "internal"
      next_hop_self: true
      peers:
      - ip: "1.1.1.1"
        description: "iBGP to R1"
      - ip: "3.3.3.3"
        description: "iBGP to R3"

    - name: "EBGP-AS200"
      type: "external"
      peer_as: 200
      export_policy: "EXPORT-OSPF-TO-EBGP"
      import_policy: "SET-LOCAL-PREF"
      peers:
      - ip: "100.100.24.2"
        description: "eBGP to R4"
