---
loopback_ipv4: "6.6.6.6/32"
isis_system_id: "0000.0000.6666"

interfaces:
  - name: "GigabitEthernet0/0/0/0"
    ipv4_address: "100.100.46.2/30"
    description: "Link to R4"
  - name: "GigabitEthernet0/0/0/1"
    ipv4_address: "100.100.56.2/30"
    description: "Link to R5"
    ospf_area: "0.0.0.0"

prefixes:
  - prefix: "10.6.6.6/32"
    state: "present"
  - prefix: "10.66.66.66/32"
    state: "present"

# Note: IOS XR automatically handles local loopbacks; we only need Null0 discards
static_routes:
  - prefix: "10.6.6.0/24"
    action: "discard"
    state: "present"
  - prefix: "10.66.66.0/24"
    action: "discard"
    state: "present"

# Define the Prefix Sets for RPL
prefix_sets:
  - name: "PS-LOCAL-PREFIXES"
    prefixes:
      - "10.6.6.0/24"
      - "10.66.66.0/24"

# Define the Routing Policies
policies:
  - name: "EXPORT-LOOPBACK"
    statements:
      - condition: "destination in PS-LOCAL-PREFIXES"
        action: "pass"
  - name: "PASS-ALL"
    statements:
      - action: "pass"

# BGP Overlay Configuration
bgp:
  local_as: 300
  groups:
    - name: "IBGP-AS300"
      type: "internal"
      next_hop_self: true
      peers:
      - ip: "5.5.5.5"
        description: "iBGP to R5"

    - name: "EBGP-AS200"
      type: "external"
      peer_as: 200
      export_policy: "EXPORT-LOOPBACK"
      import_policy: "PASS-ALL"
      peers:
      - ip: "100.100.46.1"
        description: "eBGP to R4"
