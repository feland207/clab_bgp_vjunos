---
loopback_ipv4: "5.5.5.5/32"
isis_system_id: "0000.0000.5555"

interfaces:
  - name: "GigabitEthernet0/0/0/0"
    ipv4_address: "100.100.35.2/30"
    description: "Link to R3"
  - name: "GigabitEthernet0/0/0/1"
    ipv4_address: "100.100.56.1/30"
    description: "Link to R6"
    ospf_area: "0.0.0.0"

# Define the Prefix Sets for RPL
prefix_sets:
  - name: "PS-R6-PREFIXES"
    prefixes:
      - "10.6.6.0/24"
      - "10.66.66.0/24"

# Define the Routing Policies
policies:
  - name: "EXPORT-OSPF-TO-EBGP"
    statements:
      - condition: "destination in PS-R6-PREFIXES"
        action: "pass"
  - name: "PASS-ALL"
    statements:
      - action: "pass"

# BGP Overlay Configuration
bgp:
  local_as: 300
  groups:
    - name: "IBGP-AS300"
      type: "internal"
      next_hop_self: true
      peers:
      - ip: "6.6.6.6"
        description: "iBGP to R6"

    - name: "EBGP-AS100"
      type: "external"
      peer_as: 100
      export_policy: "EXPORT-OSPF-TO-EBGP"
      import_policy: "PASS-ALL"
      peers:
      - ip: "100.100.35.1"
        description: "eBGP to R3"
