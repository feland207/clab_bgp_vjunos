# BGP Overlay Configuration
bgp:
  local_as: 100
  peers:
    - ip: "2.2.2.2"
      group: "IBGP-OVERLAY"
      type: "internal"
      peer_as: 600        # Only used if peer.type == "external"
      description: "iBGP to R6"
    - ip: "3.3.3.3"
      group: "IBGP-OVERLAY"
      type: "internal"
      peer_as: 600        # Only used if peer.type == "external"
