---
loopback_ipv4: "1.1.1.1/32"
isis_system_id: "0000.0000.1111"

interfaces:
  - name: "GigabitEthernet0/0/0/0"
    ipv4_address: "100.100.12.1/30"
    description: "Link to R2"
    ospf_area: "0.0.0.0"
  - name: "GigabitEthernet0/0/0/1"
    ipv4_address: "100.100.13.1/30"
    description: "Link to R3"
    ospf_area: "0.0.0.0"

# Additional loopback prefixes for ping/routing tests
prefixes: 
  - prefix: "10.1.1.1/32"
    state: "present"
  - prefix: "10.99.99.99/32"
    state: "present"

# Note: IOS XR automatically handles local loopbacks; we only need Null0 discards
static_routes:
  - prefix: "10.1.1.0/24"
    action: "discard"
    state: "present"
  - prefix: "10.99.99.0/24"
    action: "discard"
    state: "present"

# Define the Prefix Sets for RPL
prefix_sets:
  - name: "PS-LOCAL-PREFIXES"
    prefixes:
      - "10.1.1.0/24"
      - "10.99.99.0/24"

# Define the Routing Policies (RPL format)
policies:
  - name: "EXPORT-LOOPBACK"
    statements:
      - condition: "destination in PS-LOCAL-PREFIXES"
        action: "pass"

# BGP Overlay Configuration
bgp:
  local_as: 100
  groups:
    - name: "IBGP-AS100"
      type: "internal"
      export_policy: "EXPORT-LOOPBACK"
      peers:
      - ip: "2.2.2.2"
        description: "iBGP to R2"
      - ip: "3.3.3.3"
        description: "iBGP to R3"
