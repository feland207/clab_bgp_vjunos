---
loopback_ipv4: "1.1.1.1/32"
isis_system_id: "0000.0000.1111"
prefixes: 
  - prefix: "10.1.1.1/24"
    action: "set"
  - prefix: "10.99.99.99/24"
    action: "set"

# static routes definition
static_routes:
  - prefix: "10.1.1.0/24"
    action: "discard"
    state: "absent"
  - prefix: "10.99.99.0/24"
    action: "discard"
    state: "absent"
  - prefix: "10.1.1.1/32"
    action: "receive"
    state: "absent"
  - prefix: "10.99.99.99/32"
    action: "receive"
    # if state is omitted, it defaults to present and generates a 'set' command
    state: "absent"

interfaces:
  - name: "ge-0/0/0"
    ipv4_address: "100.100.12.1/30"
    description: "Link to R2"
    ospf_area: "0.0.0.0"
  - name: "ge-0/0/1"
    ipv4_address: "100.100.13.1/30"
    description: "Link to R3"
    ospf_area: "0.0.0.0"

# Define the routing policies
policies:
  - name: "EXPORT-LOOPBACK"
    terms:
      - name: "1"
        from_protocol: "[ direct static ]"
        route_filters:
          - "10.1.1.0/24 exact"
          - "10.99.99.0/24 exact"
        then: "accept"

# BGP Overlay Configuration
bgp:
  local_as: 100
  groups:
    - name: "IBGP-OVERLAY"
      type: "internal"
      export_policy: "EXPORT-LOOPBACK"
      peers:
      - ip: "2.2.2.2"
        description: "iBGP to R2"
      - ip: "3.3.3.3"
        description: "iBGP to R3"
