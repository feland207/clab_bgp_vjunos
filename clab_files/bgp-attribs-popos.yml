name: bgp-attribs

mgmt:
  network: custom-mgmt
  ipv4-subnet: 172.60.60.0/24

topology:
  kinds:
    juniper_vjunosswitch:
      image: vrnetlab/juniper_vjunos-switch:25.4R1.12       # The image we built
      cpu: 2                                                # Prevents GUI freezing
      memory: 3584Mi                                        # Protects our available RAM

  nodes:
    #--- CORE ROUTER ---
    R1:
      kind: juniper_vjunosswitch
      mgmt-ipv4: 172.60.60.10
      startup-delay: 60

    #--- ISPs ROUTERS ---
    R4:
      kind: juniper_vjunosswitch
      mgmt-ipv4: 172.60.60.40
      startup-delay: 120
    R5:
      kind: juniper_vjunosswitch
      mgmt-ipv4: 172.60.60.50
      startup-delay: 180

    #--- AS300 ROUTER ---
    R6:
      kind: juniper_vjunosswitch
      mgmt-ipv4: 172.60.60.60
      startup-delay: 220


  links:
    # Setting Linux veth MTU to 9100
    #--- ISPs to EDGEs ---
    - endpoints: ["R4:eth1", "host:r4tor2_id240"]
      mtu: 9100
    - endpoints: ["R5:eth1", "host:r5tor3_id350"]
      mtu: 9100

    #--- ISPs to AS300 ---
    - endpoints: ["R4:eth2", "R6:eth1"]
      mtu: 9100
    - endpoints: ["R5:eth2", "R6:eth2"]
      mtu: 9100

    #--- CORE to EDGEs ---
    - endpoints: ["R1:eth1", "host:r1tor2_id120"]
      mtu: 9100
    - endpoints: ["R1:eth2", "host:r1tor3_id130"]
      mtu: 9100


#--- ISPs to EDGEs ---
# | VNI 240 | R2 ge-0/0/0: 100.100.24.1/30 | R4 ge-0/0/0: 100.100.24.2/30 |
# | VNI 350 | R3 ge-0/0/0: 100.100.35.1/30 | R5 ge-0/0/0: 100.100.35.2/30 |

# Bridge our Popos veth interface to Debian laptop
# clab tools vxlan create --remote 192.168.1.160 --link r4tor2_id240 --id 240
# clab tools vxlan create --remote 192.168.1.160 --link r5tor3_id350 --id 350

#--- CORE to EDGEs ---
# | VNI 120 | R1 ge-0/0/0: 100.100.12.1/30 | R2 ge-0/0/2: 100.100.12.2/30 |
# | VNI 130 | R1 ge-0/0/1: 100.100.13.1/30 | R3 ge-0/0/2: 100.100.13.2/30 |

# Bridge our Popos veth interface to Debian laptop
# clab tools vxlan create --remote 192.168.1.160 --link r1tor2_id120 --id 120
# clab tools vxlan create --remote 192.168.1.160 --link r1tor3_id130 --id 130

# Static route to reach Debian mgmt
# sudo ip route add 172.50.50.0/24 via 192.168.1.160

