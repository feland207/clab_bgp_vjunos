---
- name: Overwrite Junos Credentials and save backup config
  hosts: all
  connection: juniper.device.pyez
  gather_facts: no

  vars_prompt:
    # T0 login username
    - name: user
      prompt: Enter username
      private: false

    # T0 login password
    - name: passwd
      prompt: Enter password
      private: true

  vars:
    wait_time: 60
    log_dir: ./log/ansible

  tasks:
    - name: Create local configs directory
      delegate_to: localhost
      run_once: true
      file:
        path: startup-configs
        state: directory

    - name: Update root and admin passwords
      juniper.device.config:
        load: "set"
        lines:
          - set system time-zone Europe/Paris
          - set system services ssh sftp-server
          - 'set system root-authentication encrypted-password "$6$c8BihofeHqDeBP89$B7Z06W3M4vwsGCqtAma6gC9MfoLRi.Jupo5j4mkaBEf4QbfZSepXcwe/emwXq5zpeJC/3/NTghTOp2QGMVW7A/"'
          - 'set system login user admin authentication encrypted-password "$6$c8BihofeHqDeBP89$B7Z06W3M4vwsGCqtAma6gC9MfoLRi.Jupo5j4mkaBEf4QbfZSepXcwe/emwXq5zpeJC/3/NTghTOp2QGMVW7A/"'
          # --- Add the native REST API lines; address 0.0.0.0 OR ansible_host ---
          # - set system services rest http addresses 0.0.0.0
          # - set system services rest http addresses {{ ansible_host }}

          # Not sure if needed when binding addresses 0.0.0.0
          # - set system services rest routing-instance mgmt_junos

          # Port 3000 is a custom, unprivileged port, the Docker container is not listening for it unless we map it at the container creation.
          - set system services rest http port 3000
          - set system services rest enable-explorer
        comment: Updating credentials t0 stage
      tags: credentials
      register: response

    - name: "Print the config changes"
      ansible.builtin.debug:
        var: response.diff_lines

    # Only needed if we use connection: local
    # - name: Force refresh of the Netconf session (Not needed when using connection: juniper.device.pyez)
    #   # Change the session password so the NEXT task uses the new one
    #   set_fact:
    #     ansible_password: admin123

    - name: Save configuration
      juniper.device.command:
        commands:
          - show configuration
        dest: "{{ playbook_dir }}/startup-configs/{{ inventory_hostname }}.conf"
        # dest_dir: "{{ playbook_dir }}"    # Optional to save a directory


# Update passwords workaround for the NETCONF session (which is non-interactive)
# Generate a SHA-512 hash (standard for vJunos-switch)
# openssl passwd -6 admin123
