---
- name: Overwrite IOS XR Credentials and save backup config
  hosts: all
  connection: ansible.netcommon.network_cli
  gather_facts: no

  vars_prompt:
    # T0 login username
    - name: ansible_user
      prompt: Enter username
      private: false

    # T0 login password
    - name: ansible_password
      prompt: Enter password
      private: true

  vars:
    # Optional: Prevents paramiko SSH timeout on slow XRv initial commits
    ansible_command_timeout: 120
    log_dir: ./log/ansible

    # Force SSH to use password auth instead of failing on keyboard-interactive
    # ansible_ssh_common_args: '-o PreferredAuthentications=password'

  tasks:
    - name: Create local configs directory
      delegate_to: localhost
      run_once: true
      ansible.builtin.file:
        path: startup-configs
        state: directory

    - name: Load Day-1 credentials from vault without overwriting SSH connection vars
      ansible.builtin.include_vars:
        file: secrets.yml
        name: vault_creds

    - name: Update time-zone, admin passwords and enable management APIs
      cisco.iosxr.iosxr_config:
        lines:
          # Central European Timezone
          - clock timezone CET 1
          - clock summer-time CEST recurring last Sun Mar 2:00 last Sun Oct 3:00

          # Create admin user, assign privileges, and set secret from vault
          - username {{ vault_creds.ansible_user }} group root-lr
          - username {{ vault_creds.ansible_user }} secret {{ vault_creds.ansible_password }}

          # Enable necessary management protocols
          - ssh server v2
          - ssh server netconf vrf clab-mgmt      # Tells SSH to allow NETCONF subsystem
          - netconf-yang agent ssh                # Completes the netconf-yang command
          - xml agent tty
      register: response

    - name: "Print the config changes"
      ansible.builtin.debug:
        var: response.updates

    # Only needed if we use connection: local
    # - name: Force refresh of the Netconf session (Not needed when using connection: juniper.device.pyez)
    #   # Change the session password so the NEXT task uses the new one
    #   set_fact:
    #     ansible_password: admin123

    - name: Fetch running configuration for backup
      cisco.iosxr.iosxr_command:
        commands:
          - show running-config
      register: backup_config

    - name: Save configuration to file
      ansible.builtin.copy:
        content: "{{ backup_config.stdout[0] }}"
        dest: "{{ playbook_dir }}/startup-configs/{{ inventory_hostname }}.conf"
        # dest_dir: "{{ playbook_dir }}"    # Optional to save a directory
      delegate_to: localhost


# Update passwords workaround for the NETCONF session (which is non-interactive)
# Generate a SHA-512 hash (standard for vJunos-switch)
# openssl passwd -6 admin123
