---
- name: Interactive IOS XR Show Command
  hosts: all
  connection: ansible.netcommon.network_cli
  gather_facts: no

  vars_prompt:
    - name: user_show_command
      prompt: "Enter the IOS XR show command (e.g., show version)"
      private: no
      default: "show version"

  vars:
    wait_time: 60
    log_dir: ./log/ansible

  vars_files:
    - secrets.yml

  tasks:
    - name: Create logs debug directory
      delegate_to: localhost
      run_once: true
      file:
        path: logs
        state: directory

    - name: Run command on IOS XR devices
      cisco.iosxr.iosxr_command:
        commands: "{{ user_show_command }}"
      register: cli_response

    - name: Print command results
      ansible.builtin.debug:
        msg: "{{ cli_response.stdout_lines[0] }}"

    - name: Save Full Output to Logs
      ansible.builtin.copy:
        content: "{{ cli_response.stdout[0] }}"
        dest: "./logs/{{ inventory_hostname }}_{{ user_show_command | replace(' ', '_') }}.log"
      delegate_to: localhost

    - name: Logs saved
      ansible.builtin.debug:
        msg: "Full output saved to ./logs/{{ inventory_hostname }}_{{ user_show_command | replace(' ', '_') }}.log"


